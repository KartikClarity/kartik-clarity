<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kartik Clarity™</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background:#0A0A0F;
      color:#E8E8F0;
      font-family: Arial;
    }
  </style>
</head>

<body class="p-10">

  <h1 class="text-3xl font-bold">Kartik Clarity™</h1>
  <p class="text-gray-400 mt-2">AI Revenue Intelligence OS for founders.</p>

  <div class="mt-6 bg-[#111118] p-6 rounded-xl border border-white/10 max-w-md">

    <h2 class="font-semibold mb-3">Revenue Leak Scan</h2>

    <input id="email"
      class="w-full p-3 rounded bg-black border border-white/10"
      placeholder="Enter email"
    />

    <button onclick="runScan()"
      class="mt-4 w-full bg-purple-600 hover:bg-purple-700 py-2 rounded">
      Run Scan
    </button>

    <pre id="result" class="mt-4 text-green-400 text-sm"></pre>

  </div>

<script>

const SUPABASE_URL = "https://bigovtsoqrcbmuqpetaj.supabase.co";
const SUPABASE_KEY = "PASTE_YOUR_ANON_KEY_HERE";

function generateAI() {
  return {
    leak: "Follow-up delay in pipeline",
    impact: "$10,000/month loss",
    fix: "Automate follow-ups within 24h"
  };
}

async function runScan() {

  const email = document.getElementById("email").value;
  const result = document.getElementById("result");

  if (!email) {
    result.innerText = "Enter email first";
    return;
  }

  result.innerText = "Running scan...";

  const ai = generateAI();

  const res = await fetch(SUPABASE_URL + "/rest/v1/scans", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({
      email,
      leak: ai.leak,
      impact: ai.impact,
      fix: ai.fix
    })
  });

  if (!res.ok) {
    result.innerText = "Error saving to Supabase";
    return;
  }

  result.innerText =
    "Leak: " + ai.leak + "\n" +
    "Impact: " + ai.impact + "\n" +
    "Fix: " + ai.fix;
}

</script>

</body>
</html>
