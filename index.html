<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Founder Revenue Platform™</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background:#0A0A0F;
      color:#E8E8F0;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body class="p-10">

  <h1 style="font-size:32px;font-weight:bold">
    Kartik Clarity™
  </h1>

  <p style="margin-top:10px;color:#aaa">
    AI Revenue Intelligence OS for founders.
  </p>

  <div style="margin-top:30px;background:#111;padding:20px;border-radius:10px">
    <h2>Revenue Leak Scan</h2>

    <input id="email" placeholder="Enter email"
      style="padding:10px;margin-top:10px;width:250px"/>

    <br><br>

    <button onclick="runScan()"
      style="padding:10px 20px;background:#6c5ce7;color:white;border:none;border-radius:6px">
      Run Scan
    </button>

    <pre id="result" style="margin-top:20px;color:#00ff99"></pre>
  </div>

<script>
const SUPABASE_URL = "https://bigovtsoqrcbmuqpetaj.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY_HERE";

async function runScan() {
  const email = document.getElementById("email").value;

  const data = {
    leak: "Follow-up delay in pipeline",
    impact: "$12,000/month loss",
    fix: "Automate follow-ups within 24 hours"
  };

  await fetch(SUPABASE_URL + "/rest/v1/scans", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({
      email,
      leak: data.leak,
      impact: data.impact,
      fix: data.fix
    })
  });

  document.getElementById("result").innerText =
    `Leak: ${data.leak}\nImpact: ${data.impact}\nFix: ${data.fix}`;
}
</script>

</body>
</html>
