<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kartik Clarity™</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0A0A0F;
      color: #E8E8F0;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body class="p-10">

  <!-- HEADER -->
  <h1 class="text-3xl font-bold">Kartik Clarity™</h1>
  <p class="text-gray-400 mt-2">
    AI Revenue Intelligence OS for founders.
  </p>

  <!-- CARD -->
  <div class="mt-8 bg-[#111118] p-6 rounded-xl border border-white/10 max-w-md">

    <h2 class="text-lg font-semibold mb-4">Revenue Leak Scan</h2>

    <input
      id="email"
      type="email"
      placeholder="Enter email"
      class="w-full p-3 rounded bg-black border border-white/10 text-white"
    />

    <button
      onclick="runScan()"
      class="mt-4 w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded"
    >
      Run Scan
    </button>

    <pre id="result" class="mt-4 text-green-400 text-sm"></pre>

  </div>

<script>
/* =========================
   SUPABASE CONFIG
========================= */

const SUPABASE_URL = "https://bigovtsoqrcbmuqpetaj.supabase.co";
const SUPABASE_KEY = "PASTE_YOUR_ANON_KEY_HERE";

/* =========================
   MAIN FUNCTION
========================= */

async function runScan() {

  const email = document.getElementById("email").value;

  if (!email) {
    alert("Enter email first");
    return;
  }

  const fakeAIResult = {
    leak: "Follow-up delay in sales pipeline",
    impact: "$12,000/month revenue loss",
    fix: "Automate follow-ups within 24 hours"
  };

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/scans",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        email: email,
        leak: fakeAIResult.leak,
        impact: fakeAIResult.impact,
        fix: fakeAIResult.fix
      })
    }
  );

  if (res.ok) {
    document.getElementById("result").innerText =
      "Leak: " + fakeAIResult.leak + "\n" +
      "Impact: " + fakeAIResult.impact + "\n" +
      "Fix: " + fakeAIResult.fix;

  } else {
    document.getElementById("result").innerText =
      "Error saving scan. Check Supabase settings.";
  }
}
</script>

</body>
</html>
